<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Americanas | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .column-scroll { height: calc(100vh - 200px); overflow-y: auto; scrollbar-width: none; }
        .mini-card { transition: all 0.2s ease; border: 1px solid #f1f5f9; }
        .mini-card:hover { transform: scale(1.02); border-color: #cbd5e1; }
        .tab-active { color: #E60014; font-weight: 900; border-bottom: 2px solid #E60014; }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 px-8 py-3 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <div class="w-1.5 h-6 bg-[#E60014] rounded-full"></div>
            <h1 class="text-sm font-black uppercase italic tracking-tighter">Americanas Radar</h1>
            <nav class="flex gap-4">
                <button onclick="switchMode('instagram')" id="btn-insta" class="tab-active text-[9px] uppercase tracking-widest pb-1">Instagram</button>
                <button onclick="switchMode('youtube')" id="btn-yt" class="text-slate-400 text-[9px] uppercase tracking-widest pb-1">YouTube</button>
                <button onclick="switchMode('search')" id="btn-search" class="text-slate-400 text-[9px] uppercase tracking-widest pb-1">Buscador B.I.</button>
            </nav>
        </div>
        <div id="relogio" class="text-[9px] font-mono text-slate-400"></div>
    </header>

    <main class="p-6">
        <div id="view-social" class="grid grid-cols-6 gap-4">
            </div>

        <div id="view-search" class="hidden max-w-xl mx-auto mt-10">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 space-y-6">
                <h2 class="text-xs font-black uppercase italic text-slate-800 tracking-widest text-center">Localizador de Peças TV/Offline</h2>
                <div class="space-y-2">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Código da Peça (ID)</label>
                    <input type="text" id="peca-id" placeholder="Ex: T1655520" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 text-xs font-mono outline-none focus:ring-1 focus:ring-red-500">
                </div>
                <button onclick="buscarPeca()" class="w-full bg-slate-900 text-white text-[10px] font-black py-4 rounded-xl uppercase tracking-[0.2em] hover:bg-red-600 transition">
                    Visualizar Peça no Arquivo →
                </button>
            </div>
        </div>
    </main>

    <script>
        let currentPlatform = 'instagram';

        const BRANDS = [
            { name: 'Mercado Livre', color: '#FFE600', 
              insta: 'https://api.apify.com/v2/datasets/9bCOyLMYe3od6SF6c/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
              youtube: 'https://api.apify.com/v2/datasets/fJvDUXlWAtVlJ4eJM/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N' },
            { name: 'Shopee', color: '#EE4D2D', 
              insta: 'https://api.apify.com/v2/datasets/Dj4FN5l8dRchgV4AI/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
              youtube: 'https://api.apify.com/v2/datasets/TUSjJTzKNLbGb9FIx/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N' },
            { name: 'iFood', color: '#EA1D2C', 
              insta: 'https://api.apify.com/v2/datasets/kiXhxoVHPO9e5HOTe/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
              youtube: 'https://api.apify.com/v2/datasets/dom1DPPiCxV5WthCk/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N' },
            { name: 'Magalu', color: '#0086FF', 
              insta: 'https://api.apify.com/v2/datasets/M3Okwl3oPKPCS0tae/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
              youtube: 'https://api.apify.com/v2/datasets/0Rl4Nt2yMtVWOO5c4/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N' },
            { name: 'Casas Bahia', color: '#003399', 
              insta: 'https://api.apify.com/v2/datasets/rjlTrQdObGnYkCiNv/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
              youtube: 'https://api.apify.com/v2/datasets/Nu4Q0vBcCLRDjYfHY/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N' },
            { name: 'Carrefour', color: '#004899', 
              insta: 'https://api.apify.com/v2/datasets/wutcPfuc9JX3t4Jmg/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
              youtube: 'https://api.apify.com/v2/datasets/AIfrLtFfV64nwN31l/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N' }
        ];

        function switchMode(mode) {
            currentPlatform = mode;
            document.getElementById('view-social').classList.toggle('hidden', mode === 'search');
            document.getElementById('view-search').classList.toggle('hidden', mode !== 'search');
            
            document.querySelectorAll('nav button').forEach(btn => btn.className = 'text-slate-400 text-[9px] uppercase tracking-widest pb-1');
            const activeBtn = mode === 'instagram' ? 'btn-insta' : (mode === 'youtube' ? 'btn-yt' : 'btn-search');
            document.getElementById(activeBtn).className = 'tab-active text-[9px] uppercase tracking-widest pb-1';
            
            if(mode !== 'search') renderSocial();
        }

        async function renderSocial() {
            const grid = document.getElementById('view-social');
            grid.innerHTML = '';

            for (const brand of BRANDS) {
                const api = currentPlatform === 'instagram' ? brand.insta : brand.youtube;
                const response = await fetch(api + '&clean=true&format=json');
                const posts = await response.json();
                
                let col = `
                    <div class="space-y-3">
                        <div class="border-t-2 pt-1" style="border-color:${brand.color}">
                            <h2 class="text-[8px] font-bold uppercase text-slate-400 tracking-widest">${brand.name}</h2>
                        </div>
                        <div class="column-scroll space-y-2">`;

                posts.sort((a,b) => new Date(b.timestamp || b.publishedAt) - new Date(a.timestamp || a.publishedAt)).slice(0, 8).forEach(item => {
                    const rawImg = item.displayUrl || item.videoThumbnail || item.thumbnail || item.thumbnailUrl;
                    const imgUrl = `https://images.weserv.nl/?url=${encodeURIComponent(rawImg)}&w=200&h=200&fit=cover`;
                    const link = item.url || (item.id ? `https://youtube.com/watch?v=${item.id}` : '#');
                    
                    col += `
                        <a href="${link}" target="_blank" class="mini-card block bg-white rounded-lg overflow-hidden">
                            <img src="${imgUrl}" class="w-full aspect-square object-cover grayscale-[0.5] hover:grayscale-0 transition">
                        </a>`;
                });
                col += `</div></div>`;
                grid.innerHTML += col;
            }
        }

        function buscarPeca() {
            const id = document.getElementById('peca-id').value.trim();
            if(!id) return alert("Insira o código da peça");
            // URL Base do redirecionamento do Arquivo da Propaganda
            const urlBase = "https://s03.arquivo.net/ION3IMG/?COD=STHByteaXSXCoEULcSAygsQ9iO2Vuxl6w3NITyr39HthEIEU32KUkkwJkmnnD2QG2xZUC3AlOcCLg62aTPqkifxCSr9ext$$I8qIbKeRjN-jjBP6ccMWhdulbQIAvjIrndAijw3uxwXDfTX2qse8vuMurs7fYUXZlfbVVj3gVQaKXUzE";
            window.open(urlBase, '_blank');
        }

        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
        renderSocial();
    </script>
</body>
</html>
