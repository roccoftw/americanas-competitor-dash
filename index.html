<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Americanas | BI Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .filter-select { @apply w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-[11px] font-semibold text-slate-600 focus:ring-2 focus:ring-red-500 outline-none; }
        .data-row { @apply grid grid-cols-11 gap-4 p-4 bg-white border-b border-slate-100 items-center hover:bg-slate-50 transition; }
        .header-label { @apply text-[9px] font-black text-slate-400 uppercase tracking-widest; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-white border-b border-slate-200 p-4 px-8 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-2 h-8 bg-[#E60014] rounded-full"></div>
            <h1 class="text-lg font-black uppercase italic tracking-tighter">Americanas <span class="text-slate-400 font-light">BI Radar</span></h1>
        </div>
        <div id="status-ia" class="text-[10px] font-bold text-green-500 bg-green-50 px-3 py-1 rounded-full border border-green-100 italic uppercase">
            ● AI Sync Active
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-slate-200 p-6 flex flex-col gap-6 overflow-y-auto">
            <h2 class="text-xs font-black text-slate-900 uppercase italic">Filtros Avançados</h2>
            
            <div class="space-y-4">
                <div><label class="header-label">Anunciante</label>
                    <select id="filter-brand" class="filter-select" onchange="applyFilters()">
                        <option value="">Todos</option>
                        <option>Mercado Livre</option><option>Shopee</option><option>Magalu</option><option>Carrefour</option>
                    </select>
                </div>
                <div><label class="header-label">Categoria</label>
                    <select id="filter-category" class="filter-select" onchange="applyFilters()">
                        <option value="">Todas</option>
                        <option>Varejo</option><option>Campanha</option><option>Produto</option><option>Publi</option>
                    </select>
                </div>
                <div><label class="header-label">Mídia</label>
                    <select id="filter-media" class="filter-select" onchange="applyFilters()">
                        <option value="">Todas</option>
                        <option>Instagram</option><option>YouTube</option><option>TV Aberta</option>
                    </select>
                </div>
                <div><label class="header-label">Praça</label>
                    <select id="filter-location" class="filter-select" onchange="applyFilters()">
                        <option value="">Nacional</option><option>São Paulo</option><option>Rio de Janeiro</option>
                    </select>
                </div>
            </div>

            <button onclick="clearFilters()" class="mt-4 text-[10px] font-bold text-red-600 hover:underline uppercase">Limpar Filtros</button>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 overflow-hidden">
            
            <div class="grid grid-cols-11 gap-4 p-4 bg-white border-b border-slate-200 shadow-sm z-10">
                <span class="header-label">ID</span>
                <span class="header-label">Criativo</span>
                <span class="header-label">Mídia</span>
                <span class="header-label">Anunciante</span>
                <span class="header-label">Produto</span>
                <span class="header-label">Categoria</span>
                <span class="header-label">Campanha</span>
                <span class="header-label">Análise IA</span>
                <span class="header-label">Data</span>
                <span class="header-label">Praça</span>
                <span class="header-label">Veículo</span>
            </div>

            <div id="data-container" class="flex-1 overflow-y-auto">
                </div>
        </main>
    </div>

    <script>
        // Configuração do Supabase (Substitua pelas suas chaves)
        const supabase = netlify.createClient('URL', 'KEY');

        async function applyFilters() {
            const container = document.getElementById('data-container');
            container.innerHTML = '<div class="p-10 text-center text-slate-400 animate-pulse text-xs uppercase font-bold tracking-widest">Filtrando Inteligência...</div>';

            const brand = document.getElementById('filter-brand').value;
            const category = document.getElementById('filter-category').value;
            const media = document.getElementById('filter-media').value;

            let query = supabase.from('competitor_posts').select('*').order('created_at', { ascending: false });

            if (brand) query = query.eq('brand', brand);
            if (category) query = query.eq('category', category);
            if (media) query = query.eq('platform', media);

            const { data, error } = await query;

            container.innerHTML = '';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleDateString('pt-BR');
                container.innerHTML += `
                    <div class="data-row">
                        <span class="text-[9px] font-mono text-slate-400">#${item.criativo_id || '001'}</span>
                        <div class="w-10 h-10 rounded overflow-hidden bg-slate-200 border border-slate-200">
                            <img src="${item.image_url}" class="w-full h-full object-cover">
                        </div>
                        <span class="text-[10px] font-bold text-slate-600">${item.platform || 'Social'}</span>
                        <span class="text-[10px] font-black text-slate-900">${item.brand}</span>
                        <span class="text-[10px] text-slate-500 truncate">Produto ABC</span>
                        <span class="px-2 py-1 bg-slate-100 rounded text-[9px] font-black text-slate-600 w-fit">${item.category || 'VAREJO'}</span>
                        <span class="text-[10px] text-slate-500 font-medium">${item.campanha || 'Sazonal'}</span>
                        <span class="text-[9px] text-indigo-500 italic font-medium leading-tight truncate col-span-1 border-l-2 border-indigo-100 pl-2">
                            ${item.ai_analysis || 'A postagem aborda estratégia de preço.'}
                        </span>
                        <span class="text-[10px] font-mono text-slate-400">${date}</span>
                        <span class="text-[10px] text-slate-500 font-bold uppercase">${item.praca || 'NACIONAL'}</span>
                        <span class="text-[10px] text-slate-900 font-bold">${item.veiculo || 'Instagram'}</span>
                    </div>
                `;
            });
        }

        function clearFilters() {
            document.querySelectorAll('select').forEach(s => s.value = "");
            applyFilters();
        }

        applyFilters();
    </script>
</body>
</html>
