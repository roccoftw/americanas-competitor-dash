<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Americanas | Competitor Radar</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Scroll customizado e discreto */
        .column-scroll { 
            height: calc(100vh - 180px); 
            overflow-y: auto; 
            padding-right: 8px;
        }
        .column-scroll::-webkit-scrollbar { width: 3px; }
        .column-scroll::-webkit-scrollbar-track { background: transparent; }
        .column-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* Efeito de card minimalista */
        .post-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            transition: all 0.2s ease-in-out;
        }
        .post-card:hover {
            border-color: #cbd5e1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white border-b border-slate-200 py-4 px-8 sticky top-0 z-50">
        <div class="max-w-full mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-2 h-8 bg-[#E60014] rounded-full"></div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight text-slate-900 uppercase">Americanas</h1>
                    <p class="text-[9px] font-semibold text-slate-400 uppercase tracking-widest">Intelligence Radar • Dashboard</p>
                </div>
            </div>
            <div id="relogio" class="text-[10px] font-medium text-slate-400 bg-slate-50 px-4 py-1.5 rounded-md border border-slate-100"></div>
        </div>
    </header>

    <main class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-10">
            
            <div class="space-y-6">
                <div class="border-t-4 border-[#FFE600] pt-2">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Mercado Livre</h2>
                </div>
                <div id="feed-ml" class="column-scroll space-y-6"></div>
            </div>

            <div class="space-y-6">
                <div class="border-t-4 border-[#EE4D2D] pt-2">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Shopee</h2>
                </div>
                <div id="feed-shopee" class="column-scroll space-y-6"></div>
            </div>

            <div class="space-y-6">
                <div class="border-t-4 border-[#EA1D2C] pt-2">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">iFood</h2>
                </div>
                <div id="feed-ifood" class="column-scroll space-y-6"></div>
            </div>

            <div class="space-y-6">
                <div class="border-t-4 border-[#0086FF] pt-2">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Magalu</h2>
                </div>
                <div id="feed-magalu" class="column-scroll space-y-6"></div>
            </div>

            <div class="space-y-6">
                <div class="border-t-4 border-[#003399] pt-2">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Casas Bahia</h2>
                </div>
                <div id="feed-casasbahia" class="column-scroll space-y-6"></div>
            </div>

        </div>
    </main>

    <script>
        // Relógio Real-Time
        setInterval(() => {
            const now = new Date();
            document.getElementById('relogio').innerText = now.toLocaleTimeString('pt-BR') + ' • ' + now.toLocaleDateString('pt-BR');
        }, 1000);

        const APIS = {
            ml: 'https://api.apify.com/v2/datasets/9bCOyLMYe3od6SF6c/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
            shopee: 'https://api.apify.com/v2/datasets/Dj4FN5l8dRchgV4AI/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
            ifood: 'https://api.apify.com/v2/datasets/kiXhxoVHPO9e5HOTe/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
            magalu: 'https://api.apify.com/v2/datasets/M3Okwl3oPKPCS0tae/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N',
            casasbahia: 'https://api.apify.com/v2/datasets/rjlTrQdObGnYkCiNv/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N'
        };

        async function carregarFeed(url, containerId) {
            const container = document.getElementById(containerId);
            try {
                const response = await fetch(url + '&clean=true&format=json');
                const posts = await response.json();
                const ordenados = posts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                container.innerHTML = '';
                ordenados.slice(0, 4).forEach(post => {
                    const imgUrl = `https://images.weserv.nl/?url=${encodeURIComponent(post.displayUrl || post.url)}&w=500&fit=cover`;
                    const link = post.url || `https://www.instagram.com/p/${post.shortCode}/`;
                    const data = new Date(post.timestamp).toLocaleDateString('pt-BR', {day: '2-digit', month: 'short'});
                    
                    container.innerHTML += `
                        <div class="post-card rounded-2xl overflow-hidden shadow-sm">
                            <a href="${link}" target="_blank" class="block relative group">
                                <img src="${imgUrl}" class="w-full aspect-square object-cover" loading="lazy">
                                <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                                <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg shadow-sm">
                                    <span class="text-[9px] font-bold text-slate-800">${data}</span>
                                </div>
                            </a>
                            <div class="p-4 space-y-3">
                                <p class="text-[11px] text-slate-500 leading-relaxed line-clamp-2">${post.caption || 'Sem legenda'}</p>
                                <div class="flex items-center justify-between pt-1">
                                    <div class="flex gap-3 text-[10px] font-medium text-slate-400">
                                        <span>❤️ ${post.likesCount ? post.likesCount.toLocaleString() : '---'}</span>
                                    </div>
                                    <a href="${link}" target="_blank" class="text-[10px] font-bold text-slate-900 uppercase tracking-tighter hover:text-[#E60014]">Original →</a>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { 
                container.innerHTML = '<div class="text-[10px] text-slate-300 py-10 text-center font-medium italic uppercase tracking-widest">Offline</div>'; 
            }
        }

        Object.keys(APIS).forEach(key => carregarFeed(APIS[key], `feed-${key}`));
        
        // Auto-refresh a cada 15 minutos
        setInterval(() => {
            Object.keys(APIS).forEach(key => carregarFeed(APIS[key], `feed-${key}`));
        }, 900000);
    </script>
</body>
</html>
