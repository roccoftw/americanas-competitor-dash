<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Americanas | Multi-Channel Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .column-scroll { height: calc(100vh - 250px); overflow-y: auto; scrollbar-width: thin; }
        .ai-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .ai-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white border-b border-slate-200 p-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-full mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-2 h-10 bg-[#E60014] rounded-full"></div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-900 uppercase italic">Americanas Intelligence</h1>
                    <div class="flex gap-4 mt-1">
                        <button onclick="switchPlatform('instagram')" class="text-[10px] font-bold uppercase tracking-widest text-red-600 border-b-2 border-red-600 pb-1">Instagram</button>
                        <button onclick="switchPlatform('youtube')" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-red-600 transition pb-1">YouTube</button>
                    </div>
                </div>
            </div>
            <div class="bg-slate-50 border px-4 py-2 rounded-xl text-[10px] font-mono text-slate-500" id="relogio"></div>
        </div>
    </header>

    <main class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6" id="dashboard-grid">
            </div>
    </main>

    <script>
        const marcas = [
            { id: 'ml', name: 'Mercado Livre', color: '#FFE600' },
            { id: 'shopee', name: 'Shopee', color: '#EE4D2D' },
            { id: 'ifood', name: 'iFood', color: '#EA1D2C' },
            { id: 'magalu', name: 'Magalu', color: '#0086FF' },
            { id: 'casasbahia', name: 'Casas Bahia', color: '#003399' },
            { id: 'carrefour', name: 'Carrefour', color: '#004899' }
        ];

        let currentPlatform = 'instagram';

        const supabase = netlify.createClient('SUA_URL', 'SUA_KEY'); // Substitua pelas variáveis do Vercel

        function switchPlatform(p) {
            currentPlatform = p;
            renderDashboard();
        }

        async function fetchPosts(brandName) {
            const { data } = await supabase
                .from('competitor_posts')
                .select('*')
                .eq('brand', brandName)
                .eq('platform', currentPlatform)
                .order('created_at', { ascending: false })
                .limit(3);
            return data || [];
        }

        async function renderDashboard() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';

            for (const marca of marcas) {
                const posts = await fetchPosts(marca.name);
                let html = `
                    <div class="space-y-6">
                        <div class="border-t-4 pt-2" style="border-color: ${marca.color}">
                            <h2 class="text-[11px] font-black text-slate-800 uppercase tracking-widest">${marca.name}</h2>
                        </div>
                        <div class="column-scroll space-y-6">`;
                
                posts.forEach(post => {
                    html += `
                        <div class="ai-card bg-white rounded-2xl overflow-hidden shadow-sm">
                            <div class="relative">
                                <img src="${post.image_url}" class="w-full aspect-video object-cover">
                                <span class="absolute top-2 left-2 text-[8px] font-bold px-2 py-1 bg-white/90 rounded-md shadow-sm uppercase italic">${post.category}</span>
                            </div>
                            <div class="p-4 space-y-3">
                                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                                    <p class="text-[10px] text-slate-700 leading-relaxed font-semibold">"${post.ai_analysis}"</p>
                                </div>
                            </div>
                        </div>`;
                });

                html += `</div></div>`;
                grid.innerHTML += html;
            }
        }

        renderDashboard();
    </script>
</body>
</html>
