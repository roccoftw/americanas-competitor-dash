<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Americanas | Competitor Radar</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .column-scroll { height: calc(100vh - 140px); overflow-y: auto; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">

    <header class="bg-[#E60014] text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-full mx-auto flex justify-between items-center px-4">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter italic">Americanas <span class="text-white/60 font-light">| Radar</span></h1>
            </div>
            <div class="text-[10px] font-mono bg-white/10 px-3 py-1 rounded">COMPETITOR REAL-TIME MONITOR</div>
        </div>
    </header>

    <main class="p-4">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            
            <div class="space-y-3">
                <div class="bg-[#FFE600] p-2 rounded-t-lg font-black text-[10px] uppercase text-center shadow-sm">Mercado Livre</div>
                <div id="feed-ml" class="column-scroll space-y-3"></div>
            </div>

            <div class="space-y-3">
                <div class="bg-[#EE4D2D] p-2 rounded-t-lg font-black text-[10px] uppercase text-white text-center shadow-sm">Shopee</div>
                <div id="feed-shopee" class="column-scroll space-y-3"></div>
            </div>

            <div class="space-y-3">
                <div class="bg-[#EA1D2C] p-2 rounded-t-lg font-black text-[10px] uppercase text-white text-center shadow-sm">iFood</div>
                <div id="feed-ifood" class="column-scroll space-y-3"></div>
            </div>

            <div class="space-y-3">
                <div class="bg-[#0086FF] p-2 rounded-t-lg font-black text-[10px] uppercase text-white text-center shadow-sm">Magalu</div>
                <div id="feed-magalu" class="column-scroll space-y-3"></div>
            </div>

            <div class="space-y-3">
                <div class="bg-[#003399] p-2 rounded-t-lg font-black text-[10px] uppercase text-white text-center shadow-sm">Casas Bahia</div>
                <div id="feed-casasbahia" class="column-scroll space-y-3"></div>
            </div>

        </div>
    </main>

    <script>
        // Insira aqui as URLs dos seus Datasets do Apify para cada marca
        const CONFIG = {
            ml: 'URL_APIFY_ML',
            shopee: 'URL_APIFY_SHOPEE',
            ifood: 'URL_APIFY_IFOOD',
            magalu: 'URL_APIFY_MAGALU',
            casasbahia: 'URL_APIFY_CASASBAHIA'
        };

        async function loadCompetitor(url, containerId, accentColor) {
            const container = document.getElementById(containerId);
            try {
                const res = await fetch(url + '?clean=true&format=json');
                const data = await res.json();
                container.innerHTML = '';
                data.slice(0, 4).forEach(item => {
                    const date = item.timestamp ? new Date(item.timestamp).toLocaleDateString('pt-BR') : 'Recente';
                    container.innerHTML += `
                        <div class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition">
                            ${item.displayUrl ? `<img src="https://images.weserv.nl/?url=${encodeURIComponent(item.displayUrl)}&w=300" class="w-full h-32 object-cover">` : ''}
                            <div class="p-3">
                                <p class="text-[10px] text-gray-400 mb-1 font-bold">${date}</p>
                                <p class="text-[11px] leading-tight line-clamp-3 mb-2">${item.caption || item.full_text || ''}</p>
                                <a href="${item.url}" target="_blank" class="text-[9px] font-bold uppercase text-blue-600">Ver Original</a>
                            </div>
                        </div>`;
                });
            } catch (e) { container.innerHTML = '<p class="text-[10px] text-gray-300 italic">Aguardando dados...</p>'; }
        }

        // Iniciar carregamento
        Object.keys(CONFIG).forEach(key => loadCompetitor(CONFIG[key], `feed-${key}`));
    </script>
</body>
</html>
